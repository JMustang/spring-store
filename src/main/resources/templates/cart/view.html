<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Cart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      "
    >
      <h2 style="margin: 0">Your Cart</h2>
      <div>
        <a href="/products" class="btn btn-primary mb-3">← Back to Products</a>
        <form
          th:action="@{/logout}"
          method="post"
          style="display: inline"
          sec:authorize="isAuthenticated()"
        >
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <button type="submit" class="btn btn-secondary mb-3">Logout</button>
        </form>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(cart.items)}" class="alert alert-info">
      <p>Your cart is empty. <a href="/products">Continue shopping</a></p>
    </div>

    <div th:if="${!#lists.isEmpty(cart.items)}">
      <table class="table table-bordered">
        <tr>
          <th>Product</th>
          <th>Quantity</th>
          <th>Unit Price</th>
          <th>Total</th>
          <th>Action</th>
        </tr>

        <tr th:each="item : ${cart.items}">
          <td th:text="${item.product.name}"></td>
          <td th:text="${item.quantity}"></td>
          <td
            th:text="'$' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"
          ></td>
          <td
            th:text="'$' + ${#numbers.formatDecimal(item.quantity * item.product.price, 1, 2)}"
          ></td>
          <td>
            <a
              th:href="@{/cart/remove/{id}(id=${item.id})}"
              class="btn btn-danger btn-sm"
              >Remove</a
            >
          </td>
        </tr>
        <tr th:if="${!#lists.isEmpty(cart.items)}" style="font-weight: bold; background-color: #f8f9fa">
          <td colspan="3">TOTAL:</td>
          <td th:text="'$' + ${total}"></td>
          <td></td>
        </tr>
      </table>
    </div>
  </body>
</html>
