<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      "
    >
      <h2 style="margin: 0">Products</h2>
      <div>
        <a
          href="/products/new"
          sec:authorize="hasRole('ADMIN')"
          class="btn btn-primary mb-3"
          >New Product</a
        >
        <a
          href="/cart"
          sec:authorize="isAuthenticated()"
          class="btn btn-info mb-3"
          >🛒 View Cart</a
        >
        <form
          th:action="@{/logout}"
          method="post"
          style="display: inline"
          sec:authorize="isAuthenticated()"
        >
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <button type="submit" class="btn btn-secondary mb-3">Logout</button>
        </form>
      </div>
    </div>

    <table class="table table-bordered">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
      <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.description}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.stock}"></td>
        <td>
          <div sec:authorize="isAuthenticated()" style="margin-bottom: 8px">
            <form
              th:action="@{/cart/add/{id}(id=${product.id})}"
              method="post"
              style="display: inline"
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />
              <button type="submit" class="btn btn-success btn-sm">
                Add to Cart
              </button>
            </form>
          </div>
          <div sec:authorize="hasRole('ADMIN')">
            <a
              th:href="@{/products/edit/{id}(id=${product.id})}"
              class="btn btn-warning btn-sm"
              >Edit</a
            >

            <a
              th:href="@{/products/delete/{id}(id=${product.id})}"
              class="btn btn-danger btn-sm"
              >Delete</a
            >
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
